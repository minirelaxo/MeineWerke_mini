<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Runner 3D</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
    font-size: 20px;
}
</style>
</head>
<body>
<div id="ui">
    Punkte: <span id="score">0</span>
</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
// Licht
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(10,20,10);
scene.add(light);
// Boden
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshStandardMaterial({color:0x44aa44})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
// Spieler
const player = new THREE.Mesh(
new THREE.BoxGeometry(2,4,2),
new THREE.MeshStandardMaterial({color:0x0066ff})
);
player.position.y = 2;
scene.add(player);
// Sammelobjekte
const collectibles = [];
for(let i=0;i<20;i++){
    const coin = new THREE.Mesh(
        new THREE.SphereGeometry(0.7),
        new THREE.MeshStandardMaterial({color:0xffff00})
    );
    coin.position.set(
        (Math.random()-0.5)*200,
        1,
        (Math.random()-0.5)*200
    );
    collectibles.push(coin);
    scene.add(coin);
}
let score = 0;
// Steuerung
const keys = {};
document.addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()] = true;
});
document.addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()] = false;
});
// Kamera-Modus
let cameraMode = 0;
document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase()==="z"){
        cameraMode++;
        cameraMode%=2;
    }
});
// Springen
let velocityY = 0;
let onGround = true;
function updatePlayer(){
    let speed = 0.25;
    if(keys["shift"]){
        speed = 0.5;
    }
    if(keys["w"]) player.position.z -= speed;
    if(keys["s"]) player.position.z += speed;
    if(keys["a"]) player.position.x -= speed;
    if(keys["d"]) player.position.x += speed;
    if(keys[" "] && onGround){
        velocityY = 0.4;
        onGround = false;
    }
    velocityY -= 0.02;
    player.position.y += velocityY;
    if(player.position.y <= 2){
        player.position.y = 2;
        velocityY = 0;
        onGround = true;
    }
}
// Sammelobjekte prüfen
function checkCollectibles(){
    collectibles.forEach((coin,index)=>{
        if(
            player.position.distanceTo(coin.position)
            < 3
        ){
            scene.remove(coin);
            collectibles.splice(index,1);
            score += 10;
            document.getElementById("score")
            .textContent = score;
        }
    });
}
// Kamera
function updateCamera(){
    if(cameraMode===0){
        camera.position.set(
            player.position.x,
            player.position.y + 8,
            player.position.z + 12
        );
        camera.lookAt(player.position);
    }else{
        camera.position.set(
            player.position.x,
            player.position.y + 30,
            player.position.z
        );
        camera.lookAt(player.position);
    }
}
function animate(){
    requestAnimationFrame(animate);
    updatePlayer();
    checkCollectibles();
    updateCamera();
    renderer.render(scene,camera);
}
animate();
window.addEventListener("resize",()=>{
    camera.aspect =
    window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});
</script>
</body>
</html>
