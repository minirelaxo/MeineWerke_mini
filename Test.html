<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fortnite BR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
canvas{position:absolute;top:0;left:0;display:block;}

/* ═══ SCREENS ═══════════════════════════════════════════ */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;pointer-events:all;z-index:10;}
.screen.active{display:flex;}

/* ═══ TITLE ══════════════════════════════════════════════ */
#s-title{background:radial-gradient(ellipse at 20% 80%,#0a0520,#060d1a 50%,#000);justify-content:center;padding:20px;}
#title-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) var(--del) infinite;}
@keyframes tw{0%,100%{opacity:.08;}50%{opacity:.85;}}
.t-logo{font-family:'Bungee',sans-serif;font-size:clamp(48px,9vw,80px);letter-spacing:5px;
  background:linear-gradient(180deg,#fffde7,#ffd700 35%,#ff8c00 70%,#e65100);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 36px rgba(255,180,0,.6));animation:lglow 3s infinite;}
@keyframes lglow{0%,100%{filter:drop-shadow(0 0 36px rgba(255,180,0,.6));}50%{filter:drop-shadow(0 0 55px rgba(255,200,0,.9));}}
.t-sub{color:rgba(255,255,255,.35);font-size:11px;letter-spacing:7px;text-transform:uppercase;margin-top:3px;font-family:'Rajdhani',sans-serif;}
.t-badge{background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.28);border-radius:5px;padding:3px 12px;color:#ffd700;font-size:10px;letter-spacing:3px;margin-top:7px;display:inline-block;font-family:'Rajdhani',sans-serif;}
.t-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0;width:100%;max-width:520px;padding:0 12px;}

/* career strip */
.career-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 4px;margin:10px 0;width:100%;}
.cs-item{text-align:center;}
.cs-v{color:#ffd700;font-family:'Bungee',sans-serif;font-size:20px;line-height:1;}
.cs-l{color:rgba(255,255,255,.3);font-size:8px;letter-spacing:1.5px;margin-top:1px;}

/* tab nav */
.tab-nav{display:flex;gap:4px;width:100%;margin:8px 0 4px;}
.tab-btn{flex:1;padding:8px 4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:rgba(255,255,255,.5);font-size:10px;letter-spacing:1px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;transition:all .15s;}
.tab-btn.on{background:rgba(255,200,0,.14);border-color:rgba(255,200,0,.4);color:#ffd700;}
.tab-panel{display:none;width:100%;}.tab-panel.on{display:block;}

/* skins */
.skin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:4px 0;}
.skin-card{border-radius:10px;border:2px solid rgba(255,255,255,.1);background:rgba(0,0,0,.45);padding:6px 4px 5px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.skin-card.sel{border-color:#ffd700;background:rgba(255,215,0,.12);box-shadow:0 0 12px rgba(255,215,0,.28);}
.skin-card:hover{border-color:rgba(255,215,0,.4);}
.skin-ico{font-size:24px;line-height:1;}
.skin-nm{color:rgba(255,255,255,.6);font-size:8px;letter-spacing:.5px;font-family:'Rajdhani',sans-serif;font-weight:700;}
.skin-rr{font-size:7px;font-weight:700;letter-spacing:.5px;}

/* worlds */
.world-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:4px 0;}
.world-card{border-radius:12px;border:2px solid rgba(255,255,255,.1);cursor:pointer;transition:all .18s;overflow:hidden;position:relative;height:90px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
.world-card.sel{border-color:#ffd700;box-shadow:0 0 14px rgba(255,215,0,.3);}
.world-card:hover{border-color:rgba(255,215,0,.4);}
.wc-title{font-family:'Bungee',sans-serif;font-size:13px;color:#fff;line-height:1;}
.wc-sub{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-top:2px;}
.wc-badge{position:absolute;top:7px;right:7px;font-size:9px;background:rgba(0,0,0,.5);border-radius:4px;padding:2px 6px;color:#ffd700;}

/* weapons tab */
.wep-list{display:flex;flex-direction:column;gap:6px;padding:4px 0;}
.wep-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;}
.wep-row.sel{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.35);}
.wep-ico{font-size:20px;width:28px;text-align:center;}
.wep-info{flex:1;}
.wep-name{color:#fff;font-size:12px;font-weight:700;font-family:'Rajdhani',sans-serif;}
.wep-stats{color:rgba(255,255,255,.4);font-size:9px;letter-spacing:.5px;margin-top:1px;}
.wep-rarity-bar{width:50px;height:4px;border-radius:2px;}

/* seasons */
.season-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:4px 0;}
.season-card{border-radius:10px;border:2px solid rgba(255,255,255,.08);background:rgba(0,0,0,.4);padding:10px 8px;cursor:pointer;transition:all .15s;text-align:center;}
.season-card.active-season{border-color:#ffd700;background:rgba(255,215,0,.08);}
.season-card:hover{border-color:rgba(255,255,255,.25);}
.sc-ch{color:rgba(255,255,255,.3);font-size:8px;letter-spacing:2px;}
.sc-title{color:#fff;font-family:'Bungee',sans-serif;font-size:11px;margin:2px 0;}
.sc-locked{color:rgba(255,100,100,.6);font-size:8px;display:none;}

/* name + buttons */
.name-row{display:flex;gap:8px;width:100%;margin-top:8px;}
.t-input{flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:700;outline:none;}
.t-input:focus{border-color:rgba(255,215,0,.45);}
.btn-main{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border:none;border-radius:9px;padding:13px;font-family:'Bungee',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;width:100%;box-shadow:0 0 20px rgba(255,180,0,.28);}
.btn-sec{background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:11px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;}

/* ═══ LOBBY ══════════════════════════════════════════════ */
#s-lobby{background:radial-gradient(ellipse at 30% 60%,#0a1628,#060d1a 60%,#000);padding:20px;justify-content:center;}
.l-card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px 22px;width:min(320px,92vw);}
.l-h3{color:rgba(255,255,255,.35);font-size:9px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
.l-input{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:10px 12px;color:#ffd700;font-size:15px;font-family:monospace;outline:none;margin-bottom:8px;text-transform:uppercase;letter-spacing:3px;text-align:center;}
.l-input:focus{border-color:rgba(255,200,0,.4);}
.l-row{display:flex;gap:7px;margin-bottom:7px;}
.l-btn-g{flex:1;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border:none;border-radius:7px;padding:10px;font-family:'Bungee',sans-serif;font-size:11px;cursor:pointer;}
.l-btn-s{flex:1;background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:10px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
#plist{margin-top:8px;display:flex;flex-direction:column;gap:4px;max-height:80px;overflow-y:auto;}
.pe{display:flex;align-items:center;gap:8px;padding:5px 8px;background:rgba(255,255,255,.04);border-radius:5px;}
.pe-dot{width:8px;height:8px;border-radius:50%;}
.pe-nm{color:#fff;font-size:12px;font-weight:600;font-family:'Rajdhani',sans-serif;}
.pe-host{font-size:9px;color:#ffd700;margin-left:auto;}
#lstat{color:rgba(255,150,0,.8);font-size:11px;text-align:center;margin-top:7px;letter-spacing:1px;min-height:14px;font-family:'Rajdhani',sans-serif;}
#btn-start-host{display:none;margin-top:8px;width:100%;background:linear-gradient(135deg,#00e676,#00897b);color:#000;border:none;border-radius:7px;padding:11px;font-family:'Bungee',sans-serif;font-size:12px;cursor:pointer;}

/* ═══ HUD ════════════════════════════════════════════════ */
#hud{position:absolute;inset:0;pointer-events:none;display:none;z-index:5;}
/* top */
#hud-top{position:absolute;top:0;left:0;right:0;height:54px;background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);}
#storm-box{position:absolute;top:9px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.55);border:1px solid rgba(160,0,255,.4);border-radius:18px;padding:4px 14px;white-space:nowrap;}
#storm-dot{width:13px;height:13px;border-radius:50%;border:2px solid #c084fc;animation:sdot 2s infinite;}
@keyframes sdot{0%,100%{box-shadow:0 0 5px #a855f7;}50%{box-shadow:0 0 14px #a855f7,0 0 28px rgba(168,85,247,.4);}}
#storm-txt{color:#e879f9;font-size:11px;font-weight:700;letter-spacing:1px;font-family:'Rajdhani',sans-serif;}
#kills-box{position:absolute;top:7px;right:13px;text-align:right;}
#kills-n{color:#ffd700;font-family:'Bungee',sans-serif;font-size:20px;line-height:1;text-shadow:0 0 16px rgba(255,215,0,.5);}
#kills-lbl{color:rgba(255,255,255,.38);font-size:9px;letter-spacing:2px;}
#alive-box{position:absolute;top:9px;left:106px;color:#fff;font-size:11px;font-weight:700;font-family:'Rajdhani',sans-serif;}
#alive-box span{color:rgba(255,255,255,.4);font-size:10px;}
#weather-ico{position:absolute;top:9px;left:50%;margin-left:110px;font-size:16px;opacity:.65;}
/* minimap */
#mm{position:absolute;top:12px;left:12px;width:88px;height:88px;}
#mmBrd{position:absolute;inset:0;border:2px solid rgba(255,255,255,.28);border-radius:5px;z-index:2;}
#mmCvs{width:88px;height:88px;border-radius:3px;display:block;}
#mm-n{position:absolute;top:-8px;left:50%;transform:translateX(-50%);color:#fff;font-size:8px;font-weight:700;z-index:3;}
#mm-poi{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);color:rgba(255,215,0,.7);font-size:8px;white-space:nowrap;font-family:'Rajdhani',sans-serif;font-weight:700;}
/* HP/shield */
#hud-stats{position:absolute;bottom:134px;left:16px;}
.sr{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.si{font-size:12px;width:16px;text-align:center;}
.sbg{width:148px;height:9px;background:rgba(0,0,0,.5);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.14);}
.sf{height:100%;border-radius:4px;transition:width .12s;}
#hp-f{background:linear-gradient(90deg,#ff1744,#ff6b6b);}
#sh-f{background:linear-gradient(90deg,#0288d1,#80deea);}
.sv{color:#fff;font-size:10px;font-weight:700;min-width:22px;text-align:right;font-family:'Rajdhani',sans-serif;}
/* materials bar */
#mat-bar{position:absolute;bottom:108px;left:16px;display:flex;gap:5px;}
.mat-item{display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 6px;}
.mat-ico{font-size:12px;}
.mat-val{color:#fff;font-size:10px;font-weight:700;font-family:'Rajdhani',sans-serif;min-width:22px;}
/* ammo + weapon name */
#ammo-box{position:absolute;bottom:88px;right:16px;text-align:right;}
#ammo-cur{color:#fff;font-family:'Bungee',sans-serif;font-size:28px;line-height:1;text-shadow:2px 2px 5px rgba(0,0,0,.8);}
#ammo-sep{color:rgba(255,255,255,.28);font-size:16px;margin:0 2px;}
#ammo-res{color:rgba(255,255,255,.48);font-size:16px;}
#wep-name{color:rgba(255,200,0,.8);font-size:9px;letter-spacing:2px;text-align:right;margin-top:2px;font-family:'Rajdhani',sans-serif;}
#wep-rarity-strip{height:2px;border-radius:1px;margin-top:2px;transition:background .2s;}
/* weapon slots */
#wbar{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.ws{width:54px;height:54px;border-radius:9px;background:rgba(0,0,0,.62);border:2px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;pointer-events:all;transition:all .14s;position:relative;}
.ws.active{border-color:#ffd700;background:rgba(255,215,0,.11);box-shadow:0 0 14px rgba(255,215,0,.28);}
.ws-key{position:absolute;top:2px;left:4px;font-size:8px;color:rgba(255,255,255,.38);font-family:'Rajdhani',sans-serif;}
.ws-ammo{position:absolute;bottom:2px;right:4px;font-size:8px;color:rgba(255,255,255,.55);font-family:'Rajdhani',sans-serif;}
.ws-rr{position:absolute;bottom:0;left:0;right:0;height:2.5px;border-radius:0 0 7px 7px;}
.ws-ico{font-size:20px;}
/* joystick */
#joy-zone{position:absolute;bottom:20px;left:16px;width:130px;height:130px;pointer-events:all;}
#joy-base{position:absolute;top:10px;left:10px;width:110px;height:110px;border-radius:55px;background:radial-gradient(circle,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1.5px solid rgba(255,255,255,.18);}
#joy-knob{position:absolute;top:31px;left:31px;width:46px;height:46px;border-radius:23px;background:radial-gradient(circle,rgba(255,255,255,.48),rgba(255,255,255,.18));border:2px solid rgba(255,255,255,.68);box-shadow:0 0 10px rgba(255,255,255,.12);}
/* right btns */
#rbtns{position:absolute;bottom:20px;right:14px;display:flex;flex-direction:column;gap:9px;pointer-events:all;align-items:flex-end;}
.crow{display:flex;gap:9px;align-items:center;}
.cbtn{border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;-webkit-tap-highlight-color:transparent;transition:transform .07s;}
.cbtn:active{transform:scale(.84);}
#btn-shoot{width:64px;height:64px;background:radial-gradient(circle,rgba(220,38,38,.9),rgba(185,28,28,.8));border:2px solid rgba(255,100,100,.5);box-shadow:0 0 16px rgba(220,38,38,.35);font-size:22px;}
#btn-build{width:52px;height:52px;background:radial-gradient(circle,rgba(30,136,229,.85),rgba(21,101,192,.75));border:2px solid rgba(100,170,255,.38);font-size:18px;}
#btn-auto{width:48px;height:48px;background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.18);font-size:8px;font-weight:700;color:rgba(255,255,255,.45);font-family:'Rajdhani',sans-serif;border-radius:50%;}
#btn-auto.on{background:rgba(0,230,118,.18);border-color:rgba(0,230,118,.55);color:#00e676;box-shadow:0 0 10px rgba(0,230,118,.28);}
/* crosshair */
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
/* hit effects */
#hit-v{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(200,0,0,.5) 100%);display:none;}
#hit-e{position:absolute;inset:0;pointer-events:none;border:5px solid rgba(220,38,38,.65);display:none;}
#low-hp{position:absolute;inset:0;border:4px solid rgba(220,38,38,.6);pointer-events:none;display:none;animation:lhp 1s infinite;}
@keyframes lhp{0%,100%{opacity:1;}50%{opacity:.3;}}
/* interact */
#interact-p{position:absolute;top:44%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1.5px solid rgba(255,215,0,.55);border-radius:9px;padding:7px 16px;color:#ffd700;font-size:12px;font-weight:700;display:none;pointer-events:none;white-space:nowrap;font-family:'Rajdhani',sans-serif;}
/* loot popup */
#loot-pop{position:absolute;top:37%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(255,215,0,.38);border-radius:8px;padding:6px 14px;color:#ffd700;font-size:12px;font-weight:700;display:none;pointer-events:none;white-space:nowrap;font-family:'Rajdhani',sans-serif;}
/* killfeed */
#kfeed{position:absolute;top:58px;right:12px;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.kfe{background:rgba(0,0,0,.6);border-left:3px solid #ffd700;padding:3px 9px;border-radius:0 5px 5px 0;color:#fff;font-size:10px;font-weight:600;white-space:nowrap;font-family:'Rajdhani',sans-serif;}
/* keys hint */
#khint{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.52);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:8px 12px;color:rgba(255,255,255,.5);font-size:10px;font-family:'Rajdhani',sans-serif;line-height:1.75;pointer-events:none;display:none;}
#khint b{color:rgba(255,255,255,.82);}
#room-tag{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:9px;font-family:monospace;background:rgba(0,0,0,.28);padding:2px 7px;border-radius:3px;}
/* world name banner */
#world-banner{position:absolute;top:54px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:2px;background:rgba(0,0,0,.4);padding:3px 12px;border-radius:5px;pointer-events:none;}
/* build material selector */
#mat-selector{position:absolute;right:78px;bottom:76px;display:flex;flex-direction:column;gap:4px;pointer-events:all;}
.ms-btn{width:34px;height:34px;border-radius:8px;border:2px solid rgba(255,255,255,.18);background:rgba(0,0,0,.6);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;-webkit-tap-highlight-color:transparent;}
.ms-btn.sel{border-color:#ffd700;background:rgba(255,215,0,.14);}
/* season badge in hud */
#season-badge{position:absolute;top:62px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.45);border:1px solid rgba(255,200,0,.22);border-radius:5px;color:rgba(255,200,0,.65);font-size:8px;letter-spacing:2px;padding:2px 10px;font-family:'Rajdhani',sans-serif;pointer-events:none;}

/* ═══ END SCREEN ═════════════════════════════════════════ */
#s-end{background:rgba(0,0,0,.9);backdrop-filter:blur(10px);padding:20px;justify-content:center;z-index:20;}
.end-wrap{display:flex;flex-direction:column;align-items:center;gap:0;width:min(360px,94vw);}
#end-title{font-family:'Bungee',sans-serif;font-size:clamp(26px,5vw,44px);text-align:center;margin-bottom:4px;letter-spacing:2px;}
#end-place-txt{color:rgba(255,255,255,.45);font-size:12px;font-family:'Rajdhani',sans-serif;margin-bottom:14px;letter-spacing:1px;}
.end-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:14px 20px;width:100%;margin-bottom:10px;}
.end-card h4{color:rgba(255,255,255,.28);font-size:8px;letter-spacing:3px;margin-bottom:10px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.ec-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.ec-row:last-child{border-bottom:none;}
.ec-lbl{color:rgba(255,255,255,.42);font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:600;}
.ec-val{font-family:'Bungee',sans-serif;font-size:16px;color:#fff;}
.ec-val.gold{color:#ffd700;}.ec-val.green{color:#00e676;}
.career-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.cg-item{text-align:center;}
.cg-n{color:#ffd700;font-family:'Bungee',sans-serif;font-size:18px;line-height:1;}
.cg-l{color:rgba(255,255,255,.3);font-size:8px;letter-spacing:1px;margin-top:1px;}
